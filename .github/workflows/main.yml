name: Update Lottery Data

on:
  schedule:
    - cron: '0 * * * *' # Gira ogni ora
  workflow_dispatch: # Ti permette di avviarlo a mano

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

       Pel name: Install dependencies
        run: pip install requests

      - name: Run scripts
        run: |
          python update_jackpots.py
          python update_powerball.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add lottery_data.json powerball_stats.json
          git commit -m "Auto-update lottery data" || exit 0
          git push
